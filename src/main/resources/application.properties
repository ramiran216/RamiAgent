# Spring Boot application properties
server.port=8080

# Spring AI configuration for DeepSeek
spring.ai.deepseek.api-key=${DEEPSEEK_API_KEY}
spring.ai.deepseek.chat.options.model=deepseek-chat

# UTF-8 encoding settings
server.servlet.encoding.force=true
server.servlet.encoding.charset=UTF-8

# HSQLDB Database Configuration
spring.datasource.url=jdbc:hsqldb:file:${DB_PATH:/workspaces/RamiAgent/db/ramiagent};encoding=UTF-8;sql.syntax_mys=true
spring.datasource.driver-class-name=org.hsqldb.jdbc.JDBCDriver
spring.datasource.username=sa
spring.datasource.password=

# Initialize the database schema for chat memory repository
spring.ai.chat.memory.repository.jdbc.initialize-schema=always
spring.sql.init.mode=always

# Enable logging of prompts and responses for debugging purposes
spring.ai.chat.client.observations.log-prompt=true
spring.ai.chat.client.observations.log-completion=true
